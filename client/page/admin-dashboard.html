<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>לוח בקרה מנהל | פורטל אירועים</title>
    <link rel="stylesheet" href="../css/admin-dashboard.css">
</head>
<body>

    <div class="navbar">
        <h1>לוח בקרה למנהל האולם</h1>
        <div>
            <span id="admin-name" style="margin-left: 15px; font-weight: bold;"></span>
            <button class="logout-btn" id="logout-btn">התנתקות</button>
        </div>
    </div>

    <div class="dashboard-container">
        
        <div class="stats-grid">
            <div class="stat-card">
                <h3>אירועים פעילים</h3>
                <div class="number" id="stat-active-events">0</div>
            </div>
            <div class="stat-card">
                <h3>סה"כ כרטיסים שנמכרו</h3>
                <div class="number" id="stat-tickets-sold">0</div>
            </div>
            <div class="stat-card">
                <h3>אירועים שעברו</h3>
                <div class="number" id="stat-past-events">0</div>
            </div>
        </div>

        <div class="section-header">
            <h2>ניהול אירועים במערכת</h2>
            <a href="admin-event-form.html" class="add-event-btn">+ יצירת אירוע חדש</a>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>תמונה</th>
                        <th>שם האירוע</th>
                        <th>תאריך ושעה</th>
                        <th>מיקום</th>
                        <th>מחיר</th>
                        <th>סטטוס</th>
                        <th>פעולות</th>
                    </tr>
                </thead>
                <tbody id="events-table-body">
                    </tbody>
            </table>
        </div>

    </div>
<div id="generic-popup" class="loading-overlay" style="display: none;">
    <div class="loading-popup">
        <h2 id="popup-title">כותרת</h2>
        <p id="popup-message">הודעה</p>
        
        <input type="text" id="popup-input" placeholder="נא להזין סיבה..." style="display: none; width: 80%; padding: 10px; margin: 15px 0;">
        
            <div id="popup-buttons" style="margin-top: 20px;">
                    <button id="btn-confirm" onclick="handleConfirm()" class="action-btn edit-btn" style="display: none; margin-left: 10px; padding: 10px 25px;">אישור</button>
                    <button id="btn-close" onclick="closeGenericPopup()" class="action-btn delete-btn" style="padding: 10px 25px;">סגור</button>
            </div>    
    </div>
</div>
    <script src="../js/admin-dashboard.js"></script>
</body>
</html>
