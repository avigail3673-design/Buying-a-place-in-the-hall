<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>התחברות והרשמה | פורטל אירועים</title>
<link rel="stylesheet" href="../css/login.css">
</head>
<body>

    <input type="checkbox" id="modal-toggle">

    <div class="auth-container">
        
        <div class="auth-info-side">
            <h2>האירועים הגדולים<br>מתחילים כאן</h2>
            <p>הצטרפו אלינו וקבלו גישה מהירה לרכישת כרטיסים, ניהול הזמנות ועדכונים בזמן אמת על כל האירועים והכנסים המובילים.</p>
        </div>

        <div class="auth-form-side">
            <div class="form-header">
                <h3>ברוכים הבאים</h3>
                <p>הזינו את פרטי החשבון שלכם כדי להמשיך</p>
            </div>

            <form>
                <div class="input-group">
                    <label for="email">כתובת אימייל</label>
                    <input type="email" id="email" placeholder="name@example.com" required>
                </div>

                <div class="input-group">
                    <label for="password">סיסמה</label>
                    <input type="password" id="password" placeholder="הזינו סיסמה" required>
                </div>

                <a href="#" class="forgot-password">שכחתם סיסמה?</a>

                <button type="submit" class="submit-btn">התחברות למערכת</button>
            </form>

            <div class="form-footer">
                עוד לא רשומים? <label for="modal-toggle" class="open-modal-btn">יצירת חשבון חדש</label>
            </div>
        </div>

    </div>

    <div class="modal-overlay">
        <div class="modal-card">
            
            <label for="modal-toggle" class="close-modal-btn">&times;</label>
            
            <div class="modal-header">
                <h3>יצירת חשבון חדש</h3>
                <p>הזינו את פרטיכם כדי להירשם לאתר האירועים</p>
            </div>

            <form>
                <div class="input-group">
                    <label for="reg-name">שם מלא</label>
                    <input type="text" id="reg-name" placeholder="ישראל ישראלי" required>
                </div>

                <div class="input-group">
                    <label for="reg-phone">מספר טלפון</label>
                    <input type="tel" id="reg-phone" placeholder="050-0000000" required>
                </div>

                <div class="input-group">
                    <label for="reg-email">כתובת אימייל</label>
                    <input type="email" id="reg-email" placeholder="name@example.com" required>
                </div>

                <div class="input-group">
                    <label for="reg-password">סיסמה חדשה</label>
                    <input type="password" id="reg-password" placeholder="בחרו סיסמה חזקה" required>
                </div>

                <button type="submit" class="submit-btn">סיום והרשמה</button>
            </form>

        </div>
    </div>
<script src="../js/login.js"></script>
</body>
</html>
