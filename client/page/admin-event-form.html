<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ניהול אירוע | פורטל אירועים</title>
    <link rel="stylesheet" href="../css/admin-event-form.css">
</head>
<body>
    <div class="navbar">
        <h1 id="page-title">יצירת אירוע חדש</h1>
        <a href="admin-dashboard.html" class="back-btn">חזרה ללוח הבקרה</a>
    </div>

    <div class="page-wrapper">
        <div class="form-container">
            <div class="form-header">
                <h2 id="form-title">פרטי האירוע</h2>
            </div>

            <form id="event-form">
                <div class="input-group">
                    <label for="title">שם האירוע / המופע</label>
                    <input type="text" id="title" placeholder="לדוגמה: ערב סטנדאפ, ככנס קיץ..." required>
                </div>

                <div class="input-group">
                    <label for="artist">שם האמן / המרצה</label>
                    <input type="text" id="artist" placeholder="לדוגמה: חנן בן ארי, מרצה אורח..." required>
                </div>

                <div class="row">
                    <div class="input-group">
                        <label for="date">תאריך ושעה</label>
                        <input type="datetime-local" id="date" required>
                    </div>
                    <div class="input-group">
                        <label for="location">מיקום / שם האולם</label>
                        <input type="text" id="location" placeholder="לדוגמה: האולם המרכזי" required>
                    </div>
                </div>

                <div class="row">
                    <div class="input-group">
                        <label for="price">מחיר כרטיס (בש"ח)</label>
                        <input type="number" id="price" min="0" placeholder="0" required>
                    </div>
                    <div class="input-group">
                        <label for="totalSeats">כמות מקומות באולם</label>
                        <input type="number" id="totalSeats" min="1" placeholder="לדוגמה: 200" required>
                    </div>
                </div>

                <div class="input-group">
                    <label for="image">העלאת תמונת פוסטר</label>
                    <input type="file" id="image" accept="image/*">
                    <small id="current-image-status" style="display: block; color: #aaa; margin-top: 5px;"></small>
                </div>

                <div class="input-group">
                    <label for="description">תיאור האירוע</label>
                    <textarea id="description" rows="3" placeholder="ספרו קצת על המופע..."></textarea>
                </div>

                <button type="submit" class="submit-btn" id="save-btn">פתיחת אירוע חדש</button>
            </form>
        </div>
    </div>
    <script src="../js/admin-event-form.js"></script>
</body>
</html>
